<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramalan Weton Jawa - Primbon Modern</title>
    <!-- Google Fonts untuk kesan premium & mistis -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f0f12;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --panel-bg: rgba(25, 25, 30, 0.85);
            --text-light: #f3f4f6;
            --text-gray: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(40, 40, 50, 0.5) 0%, transparent 50%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--gold-glow);
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.8rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #050507;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #b8860b, #d4af37);
            border: none;
            color: #0f0f12;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--gold-glow);
            filter: brightness(1.1);
        }

        /* Result Area */
        .result-box {
            margin-top: 2.5rem;
            display: none;
            animation: fadeIn 0.8s ease forwards;
            border-top: 1px dashed rgba(212, 175, 55, 0.3);
            padding-top: 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weton-badge {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .neptu-info {
            font-size: 0.95rem;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: rgba(212, 175, 55, 0.1);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 20px;
        }

        .character-desc {
            font-size: 0.95rem;
            color: var(--text-light);
            line-height: 1.6;
            text-align: justify;
            background: rgba(5, 5, 7, 0.4);
            padding: 1.2rem;
            border-radius: 12px;
            border-left: 4px solid var(--gold);
        }
    </style>
</head>
<body>

    <header>
        <h1>KALA WETON</h1>
        <p>Ramalan Karakter & Rahasia Lahir Berdasarkan Primbon Jawa</p>
    </header>

    <div class="container">
        <!-- Input Nama & Tanggal -->
        <div class="form-group">
            <label for="input-name">Nama Lengkap</label>
            <input type="text" id="input-name" placeholder="Masukkan namamu..." autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="input-date">Tanggal Lahir</label>
            <input type="date" id="input-date">
        </div>

        <button id="btn-calculate">HITUNG WETON</button>

        <!-- Tampilan Hasil -->
        <div class="result-box" id="result-box">
            <div class="weton-badge" id="weton-title">-</div>
            <div class="neptu-info" id="neptu-title">Neptu: -</div>
            <p class="character-desc" id="character-desc"></p>
        </div>
    </div>

    <script>
        // Array Data Hari Masehi & Nilai Neptunya
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const dayNeptu = { "Minggu": 5, "Senin": 4, "Selasa": 3, "Rabu": 7, "Kamis": 8, "Jumat": 6, "Sabtu": 9 };

        // Array Data Pasaran Jawa & Nilai Neptunya
        const pasarans = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
        const pasaranNeptu = { "Legi": 5, "Pahing": 9, "Pon": 7, "Wage": 4, "Kliwon": 8 };

        // Bank Data Watak Berdasarkan Kombinasi Pasaran
        const watakDatabase = {
            "Legi": "memiliki watak *Sumur Sinaba* (bisa menjadi tempat mengadu atau dimintai nasihat karena wawasannya luas). Kamu orangnya religius, suka kebersihan, dan sangat bertanggung jawab, meskipun terkadang suka mencurigai orang lain.",
            "Pahing": "memiliki watak *Lakuning Geni* (mirip karakter api). Kamu adalah tipe pejuang yang ambisius, cerdas, setia kawan, dan mandiri. Namun, sisi lainnya adalah kamu cenderung mudah cemburu dan kalau sudah marah sulit diredam.",
            "Pon": "memiliki watak *Lakuning Lintang* (seperti bintang yang meneduhkan). Kamu punya pesona yang disukai banyak orang, tipikal orang yang suka mengalah, rendah hati, dan berjiwa seni tinggi. Kelemahannya adalah kamu kadang sedikit boros.",
            "Wage": "memiliki watak *Lakuning Bumi* (bersifat protektif dan penyabar). Kamu adalah sosok yang tekun belajar, setia pada janji, pemaaf, dan penurut. Hanya saja, sekali kamu dikecewakan, kamu bisa menjadi sangat keras kepala.",
            "Kliwon": "memiliki watak *Lakuning Ghaib* (penuh misteri namun membawa keberuntungan). Kamu berjiwa pemimpin, pandai berbicara, sangat teguh pada prinsip, dan murah hati. Kamu juga tipe orang yang setia pada komitmen jangka panjang."
        };

        const btnCalculate = document.getElementById('btn-calculate');
        const resultBox = document.getElementById('result-box');
        const wetonTitle = document.getElementById('weton-title');
        const neptuTitle = document.getElementById('neptu-title');
        const characterDesc = document.getElementById('character-desc');

        btnCalculate.addEventListener('click', () => {
            const name = document.getElementById('input-name').value.trim();
            const dateVal = document.getElementById('input-date').value;

            if (!name || !dateVal) {
                alert("Nyuwun sewu, mohon isi nama dan tanggal lahir dengan lengkap terlebih dahulu!");
                return;
            }

            const birthDate = new Date(dateVal);
            
            // 1. Dapatkan Hari Masehi
            const dayName = days[birthDate.getDay()];
            const valDayNeptu = dayNeptu[dayName];

            // 2. Hitung Pasaran Jawa (Algoritma Selisih Hari dari Benchmark Epoche)
            // Benchmark: 7 Januari 1970 adalah Rabu Kliwon (Index Pasaran Kliwon = 4)
            const baseDate = new Date("1970-01-07");
            const diffTime = birthDate.getTime() - baseDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let pasaranIndex = (4 + (diffDays % 5)) % 5;
            if (pasaranIndex < 0) pasaranIndex += 5; // Antisipasi jika lahir sebelum tahun 1970
            
            const pasaranName = pasarans[pasaranIndex];
            const valPasaranNeptu = pasaranNeptu[pasaranName];

            // 3. Hitung Jumlah Neptu
            const totalNeptu = valDayNeptu + valPasaranNeptu;

            // 4. Olah Teks Karakter
            const baseWatak = watakDatabase[pasaranName];
            const finalPrediction = `Rahayu, <strong>${name}</strong>. Berdasarkan perhitungan Primbon, kamu lahir pada hari <strong>${dayName} ${pasaranName}</strong>. Karakter alamimu ${baseWatak} Dalam hal sosial, total nilai neptumu yang berjumlah ${totalNeptu} melambangkan energi spiritual yang kuat untuk membawa keharmonisan bagi keluarga di masa depan.`;

            // Tampilkan Hasil ke UI dengan Efek Animasi
            wetonTitle.innerText = `${dayName} ${pasaranName}`;
            neptuTitle.innerText = `Neptu: ${totalNeptu} (${valDayNeptu} + ${valPasaranNeptu})`;
            characterDesc.innerHTML = finalPrediction;
            
            resultBox.style.display = 'block';
        });
    </script>
</body>
</html>
