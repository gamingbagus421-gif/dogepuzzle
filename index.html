<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - Mainframe Access</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        #terminal {
            width: 100%;
            height: 100%;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.4;
        }
        /* Style untuk pop-up panik di akhir */
        #prankPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ff0000;
            color: #fff;
            padding: 30px;
            border: 5px solid #fff;
            box-shadow: 0 0 20px #ff0000;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            z-index: 999;
            width: 80%;
            max-width: 450px;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        #prankPopup button {
            background-color: #fff;
            color: #ff0000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-family: sans-serif;
        }
        /* Kedipan kursor ala terminal jadul */
        .cursor {
            animation: cursorBlink 1s infinite;
        }
        @keyframes cursorBlink {
            0%, 49% { background-color: #00ff00; }
            50%, 100% { background-color: transparent; }
        }
    </style>
</head>
<body>

    <!-- Area teks terminal -->
    <div id="terminal">root@mainframe:~# <span class="cursor">&nbsp;</span></div>

    <!-- Kontainer Pop-up Prank -->
    <div id="prankPopup">
        ⚠️ PERINGATAN SISTEM ⚠️<br><br>
        PROSES DOWNLOAD DATA HP / PC SELESAI 100%!<br>
        SEMUA FOTO DAN CHAT ANDA TELAH DIKIRIM KE SERVER KHUSUS.<br><br>
        <span style="font-size: 14px; font-weight: normal;">(Canda deng, kamu kena prank! 😜)</span><br>
        <button onclick="closePrank()">Tutup</button>
    </div>

    <script>
        // Potongan kode keren fiktif yang akan muncul otomatis
        const hackerCode = `
import os
import sys
import time

def bypass_firewall(target_ip):
    print(f"[+] Menghubungkan ke {target_ip}...")
    time.sleep(0.5)
    print("[+] Mencari celah keamanan keamanan...")
    # Mengabaikan enkripsi protokol SSL/TLS
    protocols = ["TCP", "UDP", "HTTP", "FTP"]
    for p in protocols:
        print(f"[-] Mencoba eksploitasi port {p}...")
    
    print("[SUCCESS] Akses Root Diterima!")
    return True

def extract_user_data():
    storage = ["/sdcard/DCIM/", "/sdcard/WhatsApp/Media/", "/system/secure/"]
    for path in storage:
        print(f"[DOWNLOAD] Menyalin data dari {path}...")
    print("[+] Mengompres file menjadi secure_package.zip...")
    print("[+] Mengirim paket data ke server luar negeri...")

bypass_firewall("192.168.1.254")
extract_user_data()
# DISCONNECTING PROXY...
# DELETING LOG FILES...
# CLEARING HISTORY...
# SYSTEM COMPROMISED!!!
`;

        const terminal = document.getElementById("terminal");
        const popup = document.getElementById("prankPopup");
        
        let index = 0;
        const speed = 4; // Jumlah karakter yang muncul setiap kali tombol ditekan
        let isFinished = false;

        // Fungsi utama untuk memicu munculnya teks haking
        function TypeHackerEffect() {
            if (isFinished) return;

            // Ambil potongan teks sesuai kecepatan
            let currentText = hackerCode.slice(index, index + speed);
            index += speed;

            // Hapus elemen kursor sementara untuk memasukkan teks baru
            const cursorSpan = document.querySelector(".cursor");
            if (cursorSpan) cursorSpan.remove();

            // Masukkan teks baru dan pasang kembali kursor kedip di ujung
            terminal.innerHTML += currentText + '<span class="cursor">&nbsp;</span>';
            
            // Otomatis scroll layar ke bawah agar mengikuti teks terbaru
            window.scrollTo(0, document.body.scrollHeight);

            // Jika kode fiktif sudah habis diketik, munculkan pop-up panik
            if (index >= hackerCode.length) {
                isFinished = true;
                setTimeout(() => {
                    popup.style.display = "block";
                }, 800);
            }
        }

        // Deteksi input keyboard (untuk Laptop/PC)
        document.addEventListener("keydown", function(e) {
            e.preventDefault(); // Mencegah fungsi asli tombol browser
            TypeHackerEffect();
        });

        // Deteksi ketukan di layar (untuk HP)
        document.addEventListener("touchstart", function(e) {
            TypeHackerEffect();
        });

        // Fungsi untuk menutup pop-up dan meriset terminal jika ingin main lagi
        function closePrank() {
            popup.style.display = "none";
            terminal.innerHTML = "root@mainframe:~# <span class="cursor">&nbsp;</span>";
            index = 0;
            isFinished = false;
        }
    </script>
</body>
</html>
