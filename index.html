<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Tantangan Otak Super Seru! ⚡</title>
    <style>
        /* --- CORE STYLE (TEMA CERIA & MENYENANGKAN) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- UTAMA CONTAINER --- */
        .game-box {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 5px solid #ff758c;
            transform: scale(1);
            transition: all 0.3s ease;
        }
        h1 {
            color: #ff4b6e;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .desc {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* --- AREA TEKA-TEKI --- */
        .puzzle-card {
            background: #fff0f2;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            border: 2px dashed #ff758c;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffd0d6;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #ff4b6e;
            box-shadow: 0 0 10px rgba(255, 75, 110, 0.2);
        }

        /* --- TOMBOL --- */
        button {
            background: linear-gradient(45deg, #ff4b6e, #ff758c);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 75, 110, 0.3);
            width: 100%;
            transition: 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 75, 110, 0.5);
        }

        /* --- ZONA JUMPSCARE (DISEMBUNYIKAN AWALNYA) --- */
        #jumpscareZone {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #jumpscareImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .jumpscare-text {
            position: absolute;
            bottom: 10%;
            font-size: 3rem;
            font-weight: 900;
            color: #ff4b6e;
            text-shadow: 3px 3px 0 #fff;
            font-family: 'Impact', sans-serif;
        }
    </style>
</head>
<body>

    <!-- Kontainer Game Utama -->
    <div class="game-box" id="gameBox">
        <h1>🧠 Mini Game Logic 🎮</h1>
        <p class="desc">Buktikan kalau kamu jenius! Jawab teka-teki logika sederhana di bawah ini dengan benar untuk memenangkan hadiah rahasia.</p>

        <!-- Kartu Pertanyaan -->
        <div class="puzzle-card">
            "Jika dibutuhkan waktu 5 menit untuk merebus 1 telur, berapa lama waktu yang diperlukan untuk merebus 5 telur secara bersamaan?"
        </div>

        <!-- Input Jawaban Target -->
        <input type="number" id="userAnswer" placeholder="Tulis jawaban angka saja..." autocomplete="off">
        
        <button onclick="checkAnswer()">Kirim Jawaban 🚀</button>
    </div>

    <!-- Kontainer Jumpscare Kucing -->
    <div id="jumpscareZone">
        <img id="jumpscareImage" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1000&auto=format&fit=crop" alt="DUARR!">
        <div class="jumpscare-text">DUAARRR!!! 🐱💥</div>
    </div>

    <!-- AUDIO JUMPSCARE KARTUN/LUCU TERBARU -->
    <audio id="scareSound" src="https://assets.mixkit.co/active_storage/sfx/2211/2211-84.wav" preload="auto"></audio>

    <script>
        function checkAnswer() {
            const answer = document.getElementById('userAnswer').value.trim();

            if (answer === "") {
                alert("Isi dulu jawabannya, jangan dikosongin ya! 😋");
                return;
            }

            if (parseInt(answer) === 5) {
                alert("Wah gila, kamu pinter banget! Jawaban kamu BENAR! 🎉");
            } else {
                triggerJumpscare();
            }
        }

        function triggerJumpscare() {
            const scareZone = document.getElementById('jumpscareZone');
            const sound = document.getElementById('scareSound');

            // Munculkan area gambar kucing
            scareZone.style.display = "flex";

            // Mainkan suara teriakan lucu dengan volume penuh
            sound.volume = 1.0;
            
            // Trik paksa audio mengulang dari awal (biar instan responsnya)
            sound.currentTime = 0; 
            
            sound.play().catch(function(error) {
                console.log("Audio sempat terblokir kebijakan browser, silakan klik layar dulu.");
            });

            // Sembunyikan kembali setelah 3.5 detik
            setTimeout(() => {
                scareZone.style.display = "none";
                alert("Ciyee kaget ya! Makanya fokus dong, kan telurnya direbus barengan! 😜🐱");
                document.getElementById('userAnswer').value = ""; 
            }, 3500);
        }
    </script>
</body>
</html>
