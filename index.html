<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Dragon Clicker</title>
    <!-- Google Fonts untuk nuansa Game Sci-Fi -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #9d4edd;
            --bg-dark: #050914;
            --panel-bg: rgba(10, 20, 38, 0.7);
            --border-blue: rgba(0, 243, 255, 0.3);
            --text-light: #e2f1ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            user-select: none; /* Agar layar tidak terblok saat diklik cepat */
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #0a1530 0%, #050914 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            overflow-x: hidden;
        }

        /* Container Utama Game */
        .game-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: var(--panel-bg);
            border: 2px solid var(--border-blue);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
            position: relative;
        }

        /* Dekonstruksi Sudut Khas Sci-Fi */
        .game-container::before {
            content: 'SYSTEM: ONLINE';
            position: absolute;
            top: -12px;
            left: 20px;
            background: #00f3ff;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* SISI KIRI: Area Klik & Skor */
        .clicker-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(0, 243, 255, 0.1);
            padding-right: 1rem;
        }

        .score-display {
            text-align: center;
            margin-bottom: 2rem;
        }

        .score-display h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .cps-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: #8ba3c7;
            margin-top: 0.2rem;
        }

        /* Tombol Utama Inti Naga */
        .dragon-core-wrapper {
            position: relative;
            cursor: pointer;
        }

        .dragon-core {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #00f3ff 0%, #0044ff 70%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: transform 0.05s ease;
            position: relative;
            z-index: 2;
        }

        /* Efek Denyut Latar Belakang Inti */
        .core-pulse {
            position: absolute;
            top: 0; left: 0; width: 200px; height: 200px;
            background: rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            z-index: 1;
            animation: corePulse 2s infinite;
            pointer-events: none;
        }

        @keyframes corePulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .dragon-core:active {
            transform: scale(0.92);
        }

        /* Efek Teks Melayang (+1) Saat Diklik */
        .floating-text {
            position: absolute;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.6s ease-out forwards;
            text-shadow: 0 0 8px var(--neon-blue);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
        }

        /* SISI KANAN: Menu Upgrade */
        .upgrade-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            justify-content: center;
        }

        .upgrade-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--border-blue);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        /* Item Upgrade */
        .upgrade-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(3, 12, 26, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Status Tombol Jika Belum Mampu Beli (Glow Redup) */
        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .upgrade-item:not(.disabled):hover {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
        }

        .upgrade-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }

        .upgrade-effect {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--neon-blue);
        }

        .upgrade-cost {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            color: #ffb703;
            font-weight: 700;
            text-align: right;
        }

        .upgrade-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--neon-purple);
            margin-left: 1rem;
            min-width: 30px;
            text-align: right;
        }

        /* Responsif Layar Kecil / HP */
        @media (max-width: 768px) {
            .game-container { grid-template-columns: 1fr; gap: 3rem; }
            .clicker-section { border-right: none; border-bottom: 1px solid rgba(0, 243, 255, 0.1); padding-right: 0; padding-bottom: 2rem; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <!-- Bagian Klik Utama (Kiri) -->
        <div class="clicker-section">
            <div class="score-display">
                <h1 id="energy-display">0</h1>
                <div class="cps-display">ENERGY GENERATED (per detik: <span id="cps-val">0</span>)</div>
            </div>
            
            <div class="dragon-core-wrapper" id="core-trigger">
                <div class="core-pulse"></div>
                <div class="dragon-core">🐉</div>
            </div>
        </div>

        <!-- Bagian Toko/Shop Upgrade (Kanan) -->
        <div class="upgrade-section">
            <h2>UPGRADE PROTOCOL</h2>
            
            <!-- Upgrade 1: Auto-Clicker Lemah -->
            <div class="upgrade-item disabled" id="upg-1" onclick="buyUpgrade(0)">
                <div class="upgrade-info">
                    <span class="upgrade-name">🤖 Hacker Drone</span>
                    <span class="upgrade-effect">+1 Energi / detik</span>
                </div>
                <div>
                    <div class="upgrade-cost" id="cost-1">Cost: 15</div>
                    <div class="upgrade-count" id="count-1">0</div>
                </div>
            </div>

            <!-- Upgrade 2: Menengah -->
            <div class="upgrade-item disabled" id="upg-2" onclick="buyUpgrade(1)">
                <div class="upgrade-info">
                    <span class="upgrade-name">🛡️ Cyber Minion</span>
                    <span class="upgrade-effect">+8 Energi / detik</span>
                </div>
                <div>
                    <div class="upgrade-cost" id="cost-2">Cost: 100</div>
                    <div class="upgrade-count" id="count-2">0</div>
                </div>
            </div>

            <!-- Upgrade 3: Kuat -->
            <div class="upgrade-item disabled" id="upg-3" onclick="buyUpgrade(2)">
                <div class="upgrade-info">
                    <span class="upgrade-name">⚡ Quantum Core</span>
                    <span class="upgrade-effect">+50 Energi / detik</span>
                </div>
                <div>
                    <div class="upgrade-cost" id="cost-3">Cost: 1100</div>
                    <div class="upgrade-count" id="count-3">0</div>
                </div>
            </div>

            <!-- Upgrade 4: Sangat Kuat -->
            <div class="upgrade-item disabled" id="upg-4" onclick="buyUpgrade(3)">
                <div class="upgrade-info">
                    <span class="upgrade-name">🌌 Nebula Matrix</span>
                    <span class="upgrade-effect">+260 Energi / detik</span>
                </div>
                <div>
                    <div class="upgrade-cost" id="cost-4">Cost: 12000</div>
                    <div class="upgrade-count" id="count-4">0</div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // --- DATA STATE GAME ---
        let energy = 0;
        let totalCPS = 0; // Click Per Second (Energi per detik)

        // Array daftar upgrade barang beserta harga dan statistiknya
        const upgrades = [
            { id: 1, baseCost: 15, currentCost: 15, count: 0, cpsValue: 1 },
            { id: 2, baseCost: 100, currentCost: 100, count: 0, cpsValue: 8 },
            { id: 3, baseCost: 1100, currentCost: 1100, count: 0, cpsValue: 50 },
            { id: 4, baseCost: 12000, currentCost: 12000, count: 0, cpsValue: 260 }
        ];

        const coreTrigger = document.getElementById('core-trigger');
        const energyDisplay = document.getElementById('energy-display');
        const cpsValDisplay = document.getElementById('cps-val');

        // --- 1. MEKANIK KLIK UTAMA ---
        coreTrigger.addEventListener('click', (e) => {
            energy += 1;
            updateUI();
            createFloatingText(e.clientX, e.clientY);
        });

        // Membuat Teks Melayang "+1" Tepat di Posisi Kursor Mouse Saat Klik
        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.classList.add('floating-text');
            text.innerText = '+1';
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;
            document.body.appendChild(text);

            // Hapus elemen teks dari memori setelah animasi selesai biar web tidak lag
            setTimeout(() => {
                text.remove();
            }, 600);
        }

        // --- 2. MEKANIK BELI UPGRADE ---
        function buyUpgrade(index) {
            const item = upgrades[index];
            
            // Jika energi cukup untuk membeli barang tersebut
            if (energy >= item.currentCost) {
                energy -= item.currentCost;
                item.count++;
                
                // Rumus menaikkan harga upgrade berikutnya (harga naik 15% setiap dibeli)
                item.currentCost = Math.floor(item.baseCost * Math.pow(1.15, item.count));
                
                // Hitung ulang total energi otomatis per detik (CPS)
                recalculateCPS();
                updateUI();
            }
        }

        function recalculateCPS() {
            totalCPS = upgrades.reduce((sum, item) => sum + (item.count * item.cpsValue), 0);
            cpsValDisplay.innerText = totalCPS;
        }

        // --- 3. REFRESH & UPDATE TAMPILAN INTERFACES ---
        function updateUI() {
            // Update skor energi utama bulat ke bawah
            energyDisplay.innerText = Math.floor(energy);

            // Cek setiap item di toko, beri nyala glow jika mampu dibeli
            upgrades.forEach((item, idx) => {
                const element = document.getElementById(`upg-${item.id}`);
                const costText = document.getElementById(`cost-${item.id}`);
                const countText = document.getElementById(`count-${item.id}`);

                costText.innerText = `Cost: ${item.currentCost}`;
                countText.innerText = item.count;

                if (energy >= item.currentCost) {
                    element.classList.remove('disabled');
                } else {
                    element.classList.add('disabled');
                }
            });
        }

        // --- 4. ENGINE TIMER OTOMATIS (GAME LOOP) ---
        // Menambahkan energi per detik secara berkala (dijalankan setiap 100ms agar pergerakan angka mulus)
        setInterval(() => {
            if (totalCPS > 0) {
                energy += (totalCPS / 10);
                updateUI();
            }
        }, 100);
    </script>
</body>
</html>
