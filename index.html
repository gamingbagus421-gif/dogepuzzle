<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free Fire HTML Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Crosshair ala FF (Titik Merah saat Kena Musuh) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: 2px solid #000;
            transition: background 0.1s;
        }

        /* UI Darah Musuh (HP Bar) */
        #enemy-ui {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 300px;
        }

        #enemy-name {
            color: #fff;
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 2px 2px #000;
        }

        .hp-bar-bg {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 5px;
            overflow: hidden;
        }

        #enemy-hp {
            width: 100%;
            height: 100%;
            background: #ff0055;
            transition: width 0.1s;
        }

        /* HUD Kontrol Kanan (Tombol Tembak ala FF Mobile) */
        #controls-right {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-fire {
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid #ff4500;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.4);
            active-transform: scale(0.9);
        }

        .btn-fire::before {
            content: '🔥';
            font-size: 2rem;
        }

        /* Efek Pop-up Angka Damage */
        .damage-pop {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            pointer-events: none;
            animation: floatDamage 0.5s ease-out forwards;
            text-shadow: 2px 2px 0px #000;
        }

        @keyframes floatDamage {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1) translateY(0); }
            50% { transform: translate(-50%, -50%) scale(1.4) translateY(-30px); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-60px); }
        }

        /* Notifikasi Kill */
        #kill-notif {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #fff;
            background: rgba(255, 69, 0, 0.8);
            padding: 10px 30px;
            border-radius: 5px;
            font-size: 1.5rem;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 20px #ff4500;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #kill-notif.show {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    
    <!-- UI Status Musuh -->
    <div id="enemy-ui">
        <div id="enemy-name">TARGET BOT (LEVEL 1)</div>
        <div class="hp-bar-bg">
            <div id="enemy-hp"></div>
        </div>
    </div>

    <!-- Papan Pengumuman Kill -->
    <div id="kill-notif">💀 KNOCK OUT!</div>

    <!-- Kontrol Tembak -->
    <div id="controls-right">
        <div class="btn-fire" id="btn-fire"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Memuat Library Grafis 3D (Three.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. SETUP DOOM / AMBIENCE 3D ---
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0); // Langit abu-abu cerah
        scene.fog = new THREE.Fog(0xa0a0a0, 10, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        // Pencahayaan
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(3, 10, 10);
        scene.add(dirLight);

        // Lantai/Tanah Lapangan Bermain
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x557a46, roughness: 0.8 }); // Rumput hijau tua
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 2. MEMBUAT PLAYER & KAMERA (Sudut Pandang TPS) ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // Karakter Utama Sederhana (Kapsul Kuning)
        const playerGeo = new THREE.CapsuleGeometry(0.4, 1, 4, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        const playerMesh = new THREE.Mesh(playerGeo, playerMat);
        playerMesh.position.y = 0.9;
        playerGroup.add(playerMesh);

        // Posisikan Kamera di belakang bahu Karakter (Khas Free Fire)
        camera.position.set(0, 2.5, 3.5);
        playerGroup.add(camera);

        // --- 3. MEMBUAT MUSUH (BOT TARGET) ---
        let enemyHP = 200;
        const maxEnemyHP = 200;

        const enemyGroup = new THREE.Group();
        enemyGroup.position.set(0, 0, -8); // Berjarak 8 meter di depan player
        scene.add(enemyGroup);

        // Badan Musuh (Warna Merah Tua)
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.5);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x990000 });
        const enemyBody = new THREE.Mesh(bodyGeo, bodyMat);
        enemyBody.position.y = 0.6;
        enemyBody.name = "body"; // Penanda Bagian Tubuh
        enemyGroup.add(enemyBody);

        // Kepala Musuh (Warna Putih/Topeng)
        const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const enemyHead = new THREE.Mesh(headGeo, headMat);
        enemyHead.position.y = 1.4;
        enemyHead.name = "head"; // Penanda Bagian Kepala
        enemyGroup.add(enemyHead);

        // --- 4. LOGIKA ROTASI KAMERA (Geser Layar untuk Membidik) ---
        let isAiming = false;
        let previousTouchX, previousTouchY;

        // Kontrol Mouse (untuk PC)
        window.addEventListener('mousedown', (e) => { if(e.target === canvas) isAiming = true; });
        window.addEventListener('mouseup', () => { isAiming = false; });
        window.addEventListener('mousemove', (e) => {
            if (isAiming) {
                playerGroup.rotation.y -= e.movementX * 0.003;
            }
        });

        // Kontrol Sentuh Layar (untuk HP)
        window.addEventListener('touchstart', (e) => {
            if(e.target === canvas) {
                isAiming = true;
                previousTouchX = e.touches[0].clientX;
                previousTouchY = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchend', () => { isAiming = false; });
        window.addEventListener('touchmove', (e) => {
            if (isAiming) {
                const touchX = e.touches[0].clientX;
                const deltaX = touchX - previousTouchX;
                playerGroup.rotation.y -= deltaX * 0.005;
                previousTouchX = touchX;
            }
        });

        // --- 5. MEKANIK TEMBAKAN & REGISTER DAMAGE ---
        const raycaster = new THREE.Raycaster();
        const fireBtn = document.getElementById('btn-fire');
        const crosshair = document.getElementById('crosshair');

        function shoot() {
            // Tembak lurus dari tengah layar (titik crosshair)
            const center = new THREE.Vector2(0, 0); 
            raycaster.setFromCamera(center, camera);

            // Cek objek apa saja yang tertembus peluru pelacak
            const intersects = raycaster.intersectObjects(enemyGroup.children);

            if (intersects.length > 0) {
                const hitObject = intersects[0].object;
                let damage = 0;
                let isHeadshot = false;

                if (hitObject.name === "head") {
                    damage = Math.floor(Math.random() * (45 - 35) + 110); // Damage besar (Headshot)
                    isHeadshot = true;
                } else if (hitObject.name === "body") {
                    damage = Math.floor(Math.random() * (28 - 18) + 18); // Damage standar (Badan)
                }

                // Kurangi Darah Musuh
                applyDamage(damage, isHeadshot);
                
                // Ubah Indikator Crosshair jadi merah sesaat sebagai feedback hit
                crosshair.style.background = "red";
                setTimeout(() => { crosshair.style.background = "rgba(255, 255, 255, 0.8)"; }, 80);
            }
        }

        fireBtn.addEventListener('click', shoot);
        // Dukungan klik keyboard Spasi untuk menembak di PC
        window.addEventListener('keydown', (e) => { if(e.code === "Space") shoot(); });

        function applyDamage(amount, isHeadshot) {
            if (enemyHP <= 0) return;

            enemyHP -= amount;
            if (enemyHP < 0) enemyHP = 0;

            // Update UI Health Bar
            const hpPercent = (enemyHP / maxEnemyHP) * 100;
            document.getElementById('enemy-hp').style.width = `${hpPercent}%`;

            // Efek Angka Damage Pop-up di Tengah Layar
            const dmgPop = document.createElement('div');
            dmgPop.classList.add('damage-pop');
            dmgPop.innerText = amount;
            
            // Set warna: Merah jika Headshot, Kuning jika kena badan (Khas Free Fire!)
            dmgPop.style.color = isHeadshot ? '#ff0000' : '#ffcc00';
            
            // Posisikan acak sedikit di dekat pusat layar agar tidak menumpuk
            dmgPop.style.left = `${(window.innerWidth / 2) + (Math.random() * 40 - 20)}px`;
            dmgPop.style.top = `${(window.innerHeight / 2) + (Math.random() * 40 - 20)}px`;
            
            document.body.appendChild(dmgPop);
            setTimeout(() => { dmgPop.remove(); }, 500);

            // Jika Musuh Mati
            if (enemyHP === 0) {
                showKillNotification();
                respawnEnemy();
            }
        }

        function showKillNotification() {
            const notif = document.getElementById('kill-notif');
            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 1500);
        }

        function respawnEnemy() {
            setTimeout(() => {
                enemyHP = maxEnemyHP;
                document.getElementById('enemy-hp').style.width = '100%';
                // Pindahkan lokasi musuh secara acak setelah mati agar tidak bosan
                enemyGroup.position.x = Math.random() * 6 - 3; 
                enemyGroup.position.z = Math.random() * -5 - 6; 
            }, 1800);
        }

        // --- 6. GAME LOOP ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);

            // Animasi idle berayun halus pada musuh agar kelihatan hidup
            if (enemyHP > 0) {
                enemyGroup.position.y = Math.sin(Date.now() * 0.003) * 0.08;
            } else {
                // Efek jatuh jika mati tereliminasi
                enemyGroup.position.y = -0.5;
            }

            renderer.render(scene, camera);
        }

        // Menjaga rasio grafis seimbang saat layar HP dirotasikan
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
