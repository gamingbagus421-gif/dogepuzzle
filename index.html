<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💘 Love Meter - Ukur Kecocokan Cintamu 💘</title>
    <style>
        /* --- RESET & BASE STYLE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND ANIMATION (RAIN OF HEARTS) --- */
        .heart-particle {
            position: absolute;
            color: rgba(255, 75, 110, 0.6);
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* --- MAIN CONTAINER --- */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.2);
            border: 4px solid #fff;
            text-align: center;
            z-index: 10;
            position: relative;
            transform: scale(1);
            transition: all 0.3s ease;
        }

        /* --- HEADER & TITLES --- */
        h1 {
            color: #d63384;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* --- INPUT FORM STYLE --- */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
            position: relative;
        }
        label {
            display: block;
            color: #ff4b6e;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper span {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #ffd0d6;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.9);
        }
        input:focus {
            border-color: #ff4b6e;
            box-shadow: 0 0 10px rgba(255, 75, 110, 0.2);
        }

        /* --- HEART ICON MIDWAY --- */
        .heart-divider {
            font-size: 2rem;
            color: #ff4b6e;
            margin: 15px 0;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* --- BUTTONS --- */
        .btn-hitung {
            background: linear-gradient(45deg, #ff4b6e, #ff758c);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 75, 110, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        .btn-hitung:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 75, 110, 0.6);
        }
        .btn-hitung:active {
            transform: translateY(1px);
        }

        /* --- LOADING ANIMATION --- */
        .loading-zone {
            display: none;
            margin: 20px 0;
        }
        .heart-loader {
            font-size: 2.5rem;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- RESULT SCREEN --- */
        .result-zone {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 20px;
            background: #fff0f2;
            border: 2px dashed #ff758c;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .percent-box {
            font-size: 4rem;
            font-weight: 900;
            color: #ff4b6e;
            margin: 10px 0;
            font-family: 'Impact', sans-serif;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ffd0d6;
        }
        .verdict {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .description {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Kontainer Utama -->
    <div class="container">
        <h1>💖 LOVE METER 💖</h1>
        <p class="subtitle">Cari tahu seberapa besar energi kecocokan takdir kalian berdua!</p>

        <!-- Input Nama 1 -->
        <div class="input-group">
            <label>Nama Kamu</label>
            <div class="input-wrapper">
                <span>👦</span>
                <input type="text" id="name1" placeholder="Masukkan nama kamu..." autocomplete="off">
            </div>
        </div>

        <!-- Pembatas Icon Hati berdenyut -->
        <div class="heart-divider">❤️</div>

        <!-- Input Nama 2 -->
        <div class="input-group">
            <label>Nama Pasangan / Crush</label>
            <div class="input-wrapper">
                <span>👧</span>
                <input type="text" id="name2" placeholder="Masukkan nama dia..." autocomplete="off">
            </div>
        </div>

        <!-- Tombol Aksi -->
        <button class="btn-hitung" onclick="calculateLove()">Cek Persentase Cinta ✨</button>

        <!-- Animasi Loading -->
        <div class="loading-zone" id="loadingZone">
            <div class="heart-loader">🔮</div>
            <p style="color: #ff4b6e; font-weight: bold; margin-top: 10px;">Membaca Garis Takdir...</p>
        </div>

        <!-- Zona Hasil Akhir -->
        <div class="result-zone" id="resultZone">
            <div id="coupleNames" style="font-weight: bold; color: #d63384; font-size: 1.1rem;"></div>
            <div class="percent-box" id="percentBox">0%</div>
            <div class="verdict" id="verdictBox">Analisis</div>
            <p class="description" id="descBox">Deskripsi</p>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC & ANIMATION -->
    <script>
        // 1. MEMBUAT HUJAN EMOJI HATI DI BACKGROUND (RAMAI & MERIAH)
        const heartIcons = ['❤️', '💖', '💘', '💝', '🌸', '💕'];
        function createHeartParticle() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            
            // Mengatur posisi acak horizontal di layar
            heart.style.left = Math.random() * 100 + "vw";
            // Mengatur ukuran acak font
            heart.style.fontSize = Math.random() * 20 + 15 + "px";
            // Mengatur durasi jatuh acak
            heart.style.animationDuration = Math.random() * 3 + 3 + "s";
            
            document.body.appendChild(heart);

            // Hapus element setelah animasi selesai biar web tidak berat
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        // Jalankan hujan hati setiap 300 milidetik
        setInterval(createHeartParticle, 300);


        // 2. LOGIKA KALKULATOR CINTA (KONSISTEN & DETAIL)
        function calculateLove() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            // Validasi Input Kosong
            if (name1 === "" || name2 === "") {
                alert("Eits! Isi dulu nama kamu dan pasanganmu ya! 🙈");
                return;
            }

            // Sembunyikan hasil lama dan tampilkan loading animasi
            document.getElementById('resultZone').style.display = "none";
            const loading = document.getElementById('loadingZone');
            loading.style.display = "block";

            // Mengunci kombinasi string agar jika nama dicoba berulang, hasilnya tetap sama (Konsisten)
            const combinedString = (name1 + name2).toLowerCase().replace(/\s+/g, '');
            let sum = 0;
            for (let i = 0; i < combinedString.length; i++) {
                sum += combinedString.charCodeAt(i);
            }
            // Rumus menghasilkan angka 45 sampai 100 biar hasilnya tidak terlalu zonk/sedikit
            const finalPercentage = (sum % 56) + 45; 

            // Menentukan teks kesimpulan dan detail deskripsi romantis berdasarkan range persen
            let verdict = "";
            let description = "";

            if (finalPercentage >= 90) {
                verdict = "👑 PASANGAN SEJATI (SOULMATE)!";
                description = "Luar biasa! Kalian berdua memiliki koneksi batin yang sangat kuat. Hubungan kalian dipenuhi rasa saling mengerti, kepercayaan tinggi, dan takdir seolah memang sengaja menyatukan kalian. Segera halalkan atau jaga dia baik-baik!";
            } else if (finalPercentage >= 75) {
                verdict = "❤️ SANGAT COCOK & HARMONIS!";
                description = "Chemistry kalian berdua sangat tinggi! Kalian punya banyak kesamaan cara pandang dan selalu seru kalau sedang mengobrol. Hambatan kecil dalam hubungan bisa diselesaikan dengan mudah karena kalian saling sayang.";
            } else if (finalPercentage >= 60) {
                verdict = "🌸 CINTA BERTUMBUH (GOOD MATCH)";
                description = "Kalian berdua berada di jalur yang aman. Ada kecocokan yang baik, namun masih butuh sedikit bumbu-bumbu kompromi dan menurunkan ego masing-masing. Komunikasi adalah kunci utama keharmonisan kalian.";
            } else {
                verdict = "⚡ BUTUH PERJUANGAN EKSTRA";
                description = "Persentase kalian tidak begitu tinggi, artinya kalian berdua sering berbeda pendapat dan punya kepribadian yang bertolak belakang. Tapi tenang, cinta bisa mengalahkan segalanya jika kalian berdua sama-sama mau berjuang dan saling sabar!";
            }

            // Jalankan jeda simulasi 2 detik seolah-olah sistem sedang menghitung serius
            setTimeout(() => {
                loading.style.display = "none";
                
                // Isi konten hasil
                document.getElementById('coupleNames').innerText = `${name1} 💖 ${name2}`;
                document.getElementById('verdictBox').innerText = verdict;
                document.getElementById('descBox').innerText = description;
                
                // Efek animasi angka persen menghitung naik (Counter effect)
                const percentBox = document.getElementById('percentBox');
                document.getElementById('resultZone').style.display = "block";
                
                let currentPercent = 0;
                const duration = 15; // Kecepatan angka naik
                const counter = setInterval(() => {
                    if (currentPercent >= finalPercentage) {
                        clearInterval(counter);
                    } else {
                        currentPercent++;
                        percentBox.innerText = currentPercent + "%";
                    }
                }, duration);

            }, 2000);
        }
    </script>
</body>
</html>
