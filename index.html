<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE'S WORD PUZZLES</title>
    <style>
        /* Tampilan Utama Website */
        body {
            font-family: 'Montserrat', sans-serif; /* Menggunakan font yang bersih, atau mirip di gambar */
            background-color: #fcebbb; /* Latar belakang kuning muda */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .browser-window {
            width: 90%;
            max-width: 1000px;
            background-color: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #f7b731; /* Header kuning tua */
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ccc;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            color: #4b3621;
            margin: 0;
            font-size: 24px;
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav a {
            text-decoration: none;
            color: #4b3621;
            background-color: #fcebbb;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
        }

        .search-bar {
            background-color: #fcebbb;
            border-radius: 15px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
        }

        .main-content {
            flex-grow: 1;
            background-color: #fff9e1; /* Area konten utama krem */
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .puzzle-box {
            background-color: #fff9e1;
            border: 4px solid #ccab70; /* Warna frame cokelat */
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            position: relative;
            max-width: 500px;
        }

        .central-shiba-head {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ccab70;
            position: absolute;
            top: -50px;
            left: calc(50% - 50px);
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-image: 1;
        }

        .shiba-icon {
            font-size: 60px;
        }

        .puzzle-title {
            color: #4b3621;
            font-size: 20px;
            margin-top: 40px;
            margin-bottom: 10px;
        }

        .puzzle-clue {
            color: #6d543e;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .answer-input-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .answer-label {
            color: #4b3621;
        }

        .answer-input {
            border: 2px solid #ccc;
            border-radius: 15px;
            padding: 10px;
            font-size: 16px;
            text-align: center;
        }

        .paw-print {
            color: #ccab70;
            font-size: 20px;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .submit-btn {
            background-color: #f7b731;
            border: none;
            color: #4b3621;
            padding: 10px 30px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .hint-btn {
            background-color: #85d1e2; /* Biru muda */
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .more-puzzles-btn {
            background-color: #85d1e2;
            border: none;
            color: white;
            padding: 10px 40px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .footer {
            background-color: #f7b731;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            color: #4b3621;
            border-top: 2px solid #ccc;
        }

        /* Jumpscare Layover */
        .jumpscare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-image: 9999; /* Sangat tinggi */
            justify-content: center;
            align-items: center;
            opacity: 0; /* Mulai tersembunyi */
            transition: opacity 0.1s ease-in; /* Flash effect */
        }

        .jumpscare-overlay.show {
            display: flex;
            opacity: 1;
        }

        .jumpscare-image {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="browser-window">
        <!-- Header -->
        <div class="header">
            <div class="logo-section">
                <span>🐾</span> <!-- Simbol paw print sederhana -->
                <h1>DOGE'S WORD PUZZLES</h1>
            </div>
            <div class="nav">
                <a href="#">Home</a>
                <a href="#">Puzzles</a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <span>🔍</span> <!-- Simbol search sederhana -->
            </div>
        </div>

        <!-- Konten Utama -->
        <div class="main-content">
            <div class="puzzle-box">
                <div class="central-shiba-head">
                    <span class="shiba-icon">🐶</span> <!-- Simbol kepala anjing sederhana -->
                </div>
                
                <p id="puzzle-title" class="puzzle-title">Teka Teki Kata Hari Ini:</p>
                <p id="puzzle-clue" class="puzzle-clue">Sedang memuat teka teki...</p>
                
                <div class="answer-input-container">
                    <span class="answer-label">Jawaban Anda:</span>
                    <input type="text" id="answer-input" class="answer-input" placeholder="...">
                    <span class="paw-print">🐾</span>
                </div>

                <div class="button-container">
                    <button id="submit-btn" class="submit-btn">Sumbit Jawaban</button>
                    <button class="hint-btn">Minta Bantuan</button>
                </div>
                
                <button id="next-puzzle-btn" class="more-puzzles-btn">Teka Teki Lainnya</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>Kebijakan</span> | <span>Kontak</span> | <span>Sosial Media: @DogePuzzle</span>
        </div>
    </div>

    <!-- Jumpscare Layover -->
    <div id="jumpscare-overlay" class="jumpscare-overlay">
        <!-- Pastikan Anda memiliki gambar scary-shiba.jpg -->
        <img src="scary-shiba.jpg" alt="Imut tapi Seram Shiba!" class="jumpscare-image">
        <!-- Pastikan Anda memiliki file scary-scream.mp3 -->
        <audio id="scary-audio" src="scary-scream.mp3" preload="auto"></audio>
    </div>

    <script>
        // Data Teka-Teki (Minta Jumpscare saat Jawaban Salah)
        // Format: { klu: "tanda tanya", jawaban: "kata kunci tunggal" }
        const puzzles = [
            { klu: "Apa yang kamu pakai, yang tidak bisa kamu sentuh? Tapi jika kamu kehilangannya, kamu tidak bisa melihat.", jawaban: "kacamata" },
            { klu: "Aku punya leher, tapi tidak punya kepala. Aku punya dua lengan, tapi tidak punya jari. Siapakah aku?", jawaban: "baju" },
            { klu: "Aku selalu ada di hadapanmu, tapi kamu tidak pernah bisa melihatku. Siapakah aku?", jawaban: "masa depan" },
            { klu: "Apa yang menjadi lebih panjang saat kamu menariknya, tetapi bisa merusak keasliannya?", jawaban: "karet" },
            { klu: "Semakin banyak kamu mengambil darinya, semakin besar dia menjadi. Siapakah aku?", jawaban: "lubang" },
            { klu: "Jika kamu memberiku makan, aku akan hidup. Tapi jika kamu memberiku minum, aku akan mati.", jawaban: "api" },
            { klu: "Aku memiliki empat roda dan bisa melaju cepat, tapi aku bukan mobil.", jawaban: "kereta api" }
        ];

        let currentPuzzle;
        const jumpscareOverlay = document.getElementById('jumpscare-overlay');
        const scaryAudio = document.getElementById('scary-audio');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const nextPuzzleBtn = document.getElementById('next-puzzle-btn');
        const puzzleTitle = document.getElementById('puzzle-title');
        const puzzleClue = document.getElementById('puzzle-clue');

        // Fungsi untuk Mengacak dan Menampilkan Teka-Teki
        function loadRandomPuzzle() {
            // Pilih satu yang berbeda dari yang terakhir (sederhana)
            let newPuzzle;
            do {
                newPuzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
            } while (newPuzzle === currentPuzzle);

            currentPuzzle = newPuzzle;
            puzzleClue.innerText = currentPuzzle.klu;
            answerInput.value = ''; // Reset input
            puzzleTitle.innerText = "Teka Teki Kata Hari Ini:";
        }

        // Fungsi Jumpscare (Menghidupkan Audio Keras & Menampilkan Gambar)
        function triggerJumpscare() {
            jumpscareOverlay.classList.add('show');
            scaryAudio.volume = 1.0; // Volume maksimum
            scaryAudio.play();

            // Matikan jumpscare setelah 3 detik
            setTimeout(() => {
                jumpscareOverlay.classList.remove('show');
                scaryAudio.pause();
                scaryAudio.currentTime = 0; // Reset audio
            }, 3000);
        }

        // Cek Jawaban
        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            if (userAnswer === currentPuzzle.jawaban) {
                puzzleTitle.innerText = "✅ JAWABAN BENAR!";
            } else {
                triggerJumpscare();
            }
        }

        // Event Listeners
        submitBtn.addEventListener('click', checkAnswer);
        
        // Memungkinkan menekan enter untuk submit
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        nextPuzzleBtn.addEventListener('click', loadRandomPuzzle);

        // Muat pertama kali
        loadRandomPuzzle();
    </script>
</body>
</html>
